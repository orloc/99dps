version: "2"

# Run with `make lint`. golangci-lint must be built with Go >= the go.mod
# version (rebuild via `go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest`).
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  exclusions:
    rules:
      # gocui's view writes can't meaningfully fail in our render path and the
      # codebase deliberately ignores them; flagging each one is pure noise.
      - linters: [errcheck]
        source: '\.(SetOrigin|SetCursor)\('
      - linters: [errcheck]
        source: 'fmt\.Fprint'
      # deferred Close on read-only files / the tail handle: nothing actionable.
      - linters: [errcheck]
        source: 'defer .*\.Close\(\)'
      - linters: [errcheck]
        source: '\.Tail\.Stop\(\)'

formatters:
  enable:
    - gofmt
